name: release

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --all-targets

  linux-binary:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release -p helm-cli
      - run: cp target/release/helm helm-x86_64-unknown-linux-gnu
      - run: sha256sum helm-x86_64-unknown-linux-gnu > helm-x86_64-unknown-linux-gnu.sha256
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            helm-x86_64-unknown-linux-gnu
            helm-x86_64-unknown-linux-gnu.sha256
